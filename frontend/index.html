<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" alt="Expense Icon">
  <h1>Expense Tracker</h1>
  <p>Track your spending smartly 💡</p>
</div>

<!-- Main Card -->
<div class="container">

  <!-- Balance Section -->
  <div class="balance-card">
    <div>
      <h3>Account Balance</h3>
      <input id="accountBalance" type="number" placeholder="Enter balance">
    </div>

    <div>
      <h3>Total Spent</h3>
      <p class="spent">₹ <span id="total">0</span></p>
    </div>

    <div>
      <h3>Remaining</h3>
      <p class="remaining">₹ <span id="remaining">0</span></p>
    </div>
  </div>

  <!-- Expense Form -->
  <div class="form">
    <input id="title" placeholder="Expense Title">
    <input id="amount" type="number" placeholder="Amount">

    <select id="category">
      <option>Food 🍔</option>
      <option>Travel 🚕</option>
      <option>Shopping 🛒</option>
      <option>Other 💸</option>
    </select>

    <input id="date" type="date">

    <button onclick="addExpense()">➕ Add Expense</button>
  </div>

  <!-- Expense Table -->
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

  <!-- Footer -->
  <footer class="footer">
    Created by <span>Bhumesh Jaiswal</span> 🚀
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
